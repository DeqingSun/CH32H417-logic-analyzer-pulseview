name: Build macOS

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sed -i '' 's/\r$//' setup_env_macos.sh build.sh
          chmod +x setup_env_macos.sh build.sh
          ./setup_env_macos.sh

      - name: Build and package
        run: ./build.sh --clean --package

      - name: Verify app bundle
        run: |
          APP=dist/LogicAnalyzer/LogicAnalyzer.app
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$APP/Contents/Info.plist")" = "11.0"
          codesign --verify --deep "$APP"
          ditto "$APP" /tmp/LogicAnalyzer-test.app
          # Quarantine xattrs are only relevant after download; ignore broken symlinks
          xattr -cr /tmp/LogicAnalyzer-test.app 2>/dev/null || true
          /tmp/LogicAnalyzer-test.app/Contents/MacOS/LogicAnalyzer --help >/dev/null

      - name: Create zip
        run: |
          cd dist
          # ditto preserves app bundle code-signature extended attributes
          ditto -c -k --sequesterRsrc --keepParent LogicAnalyzer ../LogicAnalyzer-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicAnalyzer-macOS
          path: LogicAnalyzer-macOS.zip
