name: Build Windows

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Configure git line endings
        shell: pwsh
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-gdb
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-glibmm
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-hidapi
            mingw-w64-x86_64-libzip
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-qt5-static
            mingw-w64-x86_64-python

      - name: Build and package
        run: ./build.sh --clean --package

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path dist/LogicAnalyzer -DestinationPath LogicAnalyzer-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicAnalyzer-Windows-x64
          path: LogicAnalyzer-Windows-x64.zip
