name: Build macOS

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sed -i '' 's/\r$//' setup_env_macos.sh build.sh
          chmod +x setup_env_macos.sh build.sh
          ./setup_env_macos.sh

      - name: Build and package
        run: ./build.sh --clean --package

      - name: Create zip
        run: |
          cd dist
          zip -ry ../LogicAnalyzer-macOS.zip LogicAnalyzer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicAnalyzer-macOS
          path: LogicAnalyzer-macOS.zip
